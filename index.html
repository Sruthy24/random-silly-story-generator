<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Silly Story Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>😂 Random Silly Story Generator</h1>

    <input
        type="text"
        id="customName"
        placeholder="Enter your name (optional)"
    >

    <button id="generate">
        Generate Story
    </button>

    <div class="story" id="story">
        Click the button to generate a funny story!
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
